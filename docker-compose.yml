version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: db_ecommerce
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: spring-backend
    ports:
      - "8080:8080"
    env_file:
      - .env 
    environment:
      - DB_HOST=postgres-db 
    depends_on:
      - postgres-db
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge